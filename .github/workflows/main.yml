name: ci

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - 'nextjs/specs/**'
      - '**/*.example'
      - '**/*.md'
      - '**/.dockerignore'
      - '**/.gitignore'
      - '**/.modified'
      - '.devcontainer/**'
      
permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}
  MARIADB_DOCKERFILE: nextjs/docker/Dockerfile.mariadb
  NGINX_DOCKERFILE: nextjs/docker/Dockerfile.nginx
  NEXTJS_DOCKERFILE: nextjs/docker/Dockerfile.nextjs
  FLYWAY_DOCKERFILE: nextjs/docker/Dockerfile.flyway
  NEXTJS_APP_CONTEXT: nextjs/
  WS_DOCKERFILE: ws-server/Dockerfile
  WS_CONTEXT: ws-server/

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # semantic-release needs full history and tags

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push all images
        env:
          VERSION: ${{ steps.semantic.outputs.new_release_version }}
          NEW_RELEASE: ${{ steps.semantic.outputs.new_release_published }}
        run: |
          build_and_push() {
            local name="$1"
            local dockerfile="$2"
            local context="$3"

            local tags="-t $REGISTRY/$IMAGE_NAMESPACE/$name:latest"
            tags="$tags -t $REGISTRY/$IMAGE_NAMESPACE/$name:${{ github.sha }}"

            if [ "$NEW_RELEASE" = "true" ]; then
              tags="$tags -t $REGISTRY/$IMAGE_NAMESPACE/$name:$VERSION"
              echo "📦 Releasing $name version $VERSION"
            fi

            echo "🔨 Building $name..."
            docker build $tags -f "$dockerfile" "$context"

            echo "🚀 Pushing $name..."
            docker push --all-tags "$REGISTRY/$IMAGE_NAMESPACE/$name"
          }

          build_and_push "mariadb"    "$MARIADB_DOCKERFILE"  "$NEXTJS_APP_CONTEXT"
          build_and_push "nginx"      "$NGINX_DOCKERFILE"    "$NEXTJS_APP_CONTEXT"
          build_and_push "nextjs-app" "$NEXTJS_DOCKERFILE"   "$NEXTJS_APP_CONTEXT"
          build_and_push "flyway"     "$FLYWAY_DOCKERFILE"   "$NEXTJS_APP_CONTEXT"
          build_and_push "ws-server"  "$WS_DOCKERFILE"       "$WS_CONTEXT"
