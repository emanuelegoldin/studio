name: pr-title-check

on:
  pull_request:
    branches: [ main ]
    types: [ opened, edited, synchronize, reopened ]

jobs:
  check-version-keyword:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title contains version keyword
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          MAJOR=0; MINOR=0; MICRO=0

          [[ "$PR_TITLE" == *"[MAJOR]"* ]] && MAJOR=1
          [[ "$PR_TITLE" == *"[MINOR]"* ]] && MINOR=1
          [[ "$PR_TITLE" == *"[MICRO]"* ]] && MICRO=1

          COUNT=$((MAJOR + MINOR + MICRO))

          if [ "$COUNT" -eq 0 ]; then
            echo "::error::PR title must contain exactly one of [MAJOR], [MINOR], or [MICRO]."
            echo ""
            echo "  Current title: \"$PR_TITLE\""
            echo ""
            echo "  Examples:"
            echo "    Add team voting feature [MINOR]"
            echo "    Fix login redirect [MICRO]"
            echo "    Rewrite bingo engine [MAJOR]"
            exit 1
          fi

          if [ "$COUNT" -gt 1 ]; then
            echo "::error::PR title contains multiple version keywords. Use exactly one of [MAJOR], [MINOR], or [MICRO]."
            echo ""
            echo "  Current title: \"$PR_TITLE\""
            exit 1
          fi

          echo "✅ PR title contains a valid version keyword."
          echo "   Title: \"$PR_TITLE\""
          echo "   Release type: $([ $MAJOR -eq 1 ] && echo "MAJOR" || ([ $MINOR -eq 1 ] && echo "MINOR" || echo "MICRO"))"
